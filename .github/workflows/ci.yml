name: CI-CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: sofinvalery/devops

jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev

      - name: Run build script
        run: |
          chmod +x ci/*.sh
          ci/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverse-bin
          path: out/reverse

  test:
    name: Test
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reverse-bin
          path: out

      - name: Run test script
        run: |
          chmod +x ci/*.sh out/reverse
          ci/test.sh ./out/reverse

  package:
    name: Package
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg-dev

      - name: Run package script
        run: |
          chmod +x ci/*.sh
          ci/package.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverse-deb
          path: dist/*.deb

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: package
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: reverse-deb
          path: dist

      - name: Build Docker image from .deb
        run: |
          set -euo pipefail
          ls -la dist
          docker build -t reverse:ci .

      - name: Run container and validate output
        run: |
          set -euo pipefail
          docker run --rm reverse:ci | tee container.out
          grep -Eq '^Zeros above main diagonal: [0-9]+$' container.out
          grep -Eq '^Positive below secondary diagonal: [0-9]+$' container.out

      - name: Log in to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image to Docker Hub
        if: startsWith(github.ref, 'refs/tags/v') && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          docker tag reverse:ci "${IMAGE_NAME}:${VERSION_TAG}"
          docker tag reverse:ci "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${VERSION_TAG}"
          docker push "${IMAGE_NAME}:latest"

      - name: Docker Hub push skipped
        if: startsWith(github.ref, 'refs/tags/v') && (secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '')
        run: echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN are not set. Skipping Docker Hub push."

  release:
    name: Release
    runs-on: self-hosted
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: reverse-deb
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
