replicaCount: 1

image:
  repository: sofinvalery/devops
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 8080
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

metrics:
  serviceMonitor:
    enabled: true
    interval: 15s
    path: /metrics
    labels:
      release: kube-prometheus-stack
